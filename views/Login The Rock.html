<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Login - The Rock</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background-image: url('assets/img/fondo.png');
    background-size: cover;
}

/* CONTENEDOR */
.contenedor {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* TARJETA GRANDE */
.card {
    display: flex;
    width: 700px;
    background: #e6e6e6;
    border-radius: 30px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    overflow: hidden;
}

/* LADO IZQUIERDO */
.izquierda {
    width: 40%;
    background: #8b5a2b;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    color: white;
}

.logo {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    object-fit: cover;
    margin-bottom: 10px;
}

/* LADO DERECHO */
.derecha {
    width: 60%;
    padding: 40px;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

/* INPUTS */
.input-group {
    display: flex;
    flex-direction: column;
    margin-bottom: 15px;
}

input {
    padding: 12px;
    border-radius: 20px;
    border: 2px solid transparent;
    outline: none;
}

/* ERROR */
.error {
    border: 2px solid red;
}

.error-text {
    color: red;
    font-size: 12px;
    margin-top: 5px;
}

/* BOTÓN */
button {
    margin-top: 10px;
    padding: 10px;
    border-radius: 20px;
    border: none;
    background: #d9d9d9;
    cursor: pointer;
}

/* ===== MODAL ===== */
.modal {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.4);
    display: none;
    justify-content: center;
    align-items: center;
}

.modal-content {
    background: #d9d9d9;
    padding: 30px;
    border-radius: 25px;
    width: 400px;
    text-align: center;
}

.icono {
    font-size: 40px;
    margin-bottom: 10px;
}

.modal button {
    margin-top: 15px;
}
</style>
</head>

<body>

<div class="contenedor">

    <div class="card">

        <!-- IZQUIERDA -->
        <div class="izquierda">
            <img src="assets/img/logo.png" class="logo">
            <h3>Iniciar Sesión</h3>
        </div>

        <!-- DERECHA -->
        <div class="derecha">

            <div class="input-group">
                <input type="text" id="correo" placeholder="correo electronico">
                <div id="errorCorreo" class="error-text"></div>
            </div>

            <div class="input-group">
                <input type="password" id="password" placeholder="contraseña">
                <div id="errorPassword" class="error-text"></div>
            </div>

            <button onclick="login()">Iniciar sesión</button>

        </div>

    </div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
    <div class="modal-content">
        <div class="icono" id="modalIcon">ℹ️</div>
        <h3 id="modalTitulo"></h3>
        <p id="modalMensaje"></p>
        <button onclick="cerrarModal()">OK</button>
    </div>
</div>

<script>
function mostrarModal(tipo, titulo, mensaje) {
    const modal = document.getElementById("modal");
    const icono = document.getElementById("modalIcon");

    document.getElementById("modalTitulo").textContent = titulo;
    document.getElementById("modalMensaje").textContent = mensaje;

    if(tipo === "success") icono.textContent = "✅";
    else if(tipo === "error") icono.textContent = "❌";
    else icono.textContent = "ℹ️";

    modal.style.display = "flex";
}

function cerrarModal() {
    document.getElementById("modal").style.display = "none";
}

function login() {
    const correo = document.getElementById("correo");
    const password = document.getElementById("password");

    const errorCorreo = document.getElementById("errorCorreo");
    const errorPassword = document.getElementById("errorPassword");

    let valido = true;

    correo.classList.remove("error");
    password.classList.remove("error");
    errorCorreo.textContent = "";
    errorPassword.textContent = "";

    if(!correo.value.includes("@")) {
        correo.classList.add("error");
        errorCorreo.textContent = "Correo no válido";
        valido = false;
    }

    if(password.value.length < 6) {
        password.classList.add("error");
        errorPassword.textContent = "Mínimo 6 caracteres";
        valido = false;
    }

    if(!valido){
        mostrarModal("error", "Error en formulario", "Corrige los campos");
        return;
    }

    if(correo.value === "admin@gmail.com" && password.value === "123456"){
        mostrarModal("success", "Login exitoso", "Bienvenido al sistema");
    } else {
        mostrarModal("error", "Error", "Correo o contraseña incorrectos");
    }
}
</script>

</body>
</html>
