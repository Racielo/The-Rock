<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Registro - The Rock</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background-image: url('assets/img/fondo.png');
    background-size: cover;
}

/* CONTENEDOR */
.contenedor {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* TARJETA */
.card {
    display: flex;
    width: 750px;
    background: #e6e6e6;
    border-radius: 30px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    overflow: hidden;
}

/* IZQUIERDA */
.izquierda {
    width: 40%;
    background: #8b5a2b;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    color: white;
}

.logo {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    object-fit: cover;
    margin-bottom: 10px;
}

/* DERECHA */
.derecha {
    width: 60%;
    padding: 30px;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

/* INPUTS */
.input-group {
    display: flex;
    flex-direction: column;
    margin-bottom: 12px;
}

input {
    padding: 12px;
    border-radius: 20px;
    border: 2px solid transparent;
    outline: none;
}

/* ERRORES */
.error {
    border: 2px solid red;
}

.error-text {
    color: red;
    font-size: 12px;
    margin-top: 5px;
}

/* BOTÓN */
button {
    margin-top: 10px;
    padding: 10px;
    border-radius: 20px;
    border: none;
    background: #d9d9d9;
    cursor: pointer;
}

/* MODAL */
.modal {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.4);
    display: none;
    justify-content: center;
    align-items: center;
}

.modal-content {
    background: #d9d9d9;
    padding: 30px;
    border-radius: 25px;
    width: 400px;
    text-align: center;
}

.icono {
    font-size: 40px;
    margin-bottom: 10px;
}
</style>
</head>

<body>

<div class="contenedor">

    <div class="card">

        <!-- IZQUIERDA -->
        <div class="izquierda">
            <img src="assets/img/logo.png" class="logo">
            <h3>Crear Cuenta</h3>
        </div>

        <!-- DERECHA -->
        <div class="derecha">

            <div class="input-group">
                <input type="text" id="nombre" placeholder="Nombre completo">
                <div id="errorNombre" class="error-text"></div>
            </div>

            <div class="input-group">
                <input type="text" id="correo" placeholder="Correo">
                <div id="errorCorreo" class="error-text"></div>
            </div>

            <div class="input-group">
                <input type="password" id="password" placeholder="Contraseña">
                <div id="errorPassword" class="error-text"></div>
            </div>

            <div class="input-group">
                <input type="password" id="confirmar" placeholder="Confirmar contraseña">
                <div id="errorConfirmar" class="error-text"></div>
            </div>

            <button onclick="registrar()">Crear cuenta</button>

        </div>

    </div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
    <div class="modal-content">
        <div class="icono" id="modalIcon">ℹ️</div>
        <h3 id="modalTitulo"></h3>
        <p id="modalMensaje"></p>
        <button onclick="cerrarModal()">OK</button>
    </div>
</div>

<script>
function mostrarModal(tipo, titulo, mensaje) {
    const modal = document.getElementById("modal");
    const icono = document.getElementById("modalIcon");

    document.getElementById("modalTitulo").textContent = titulo;
    document.getElementById("modalMensaje").textContent = mensaje;

    if(tipo === "success") icono.textContent = "✅";
    else if(tipo === "error") icono.textContent = "❌";
    else icono.textContent = "ℹ️";

    modal.style.display = "flex";
}

function cerrarModal() {
    document.getElementById("modal").style.display = "none";
}

function registrar() {
    let valido = true;

    const nombre = document.getElementById("nombre");
    const correo = document.getElementById("correo");
    const password = document.getElementById("password");
    const confirmar = document.getElementById("confirmar");

    const errorNombre = document.getElementById("errorNombre");
    const errorCorreo = document.getElementById("errorCorreo");
    const errorPassword = document.getElementById("errorPassword");
    const errorConfirmar = document.getElementById("errorConfirmar");

    // limpiar
    [nombre, correo, password, confirmar].forEach(i => i.classList.remove("error"));
    errorNombre.textContent = "";
    errorCorreo.textContent = "";
    errorPassword.textContent = "";
    errorConfirmar.textContent = "";

    // validaciones
    if(nombre.value === ""){
        nombre.classList.add("error");
        errorNombre.textContent = "Ingresa tu nombre";
        valido = false;
    }

    if(!correo.value.includes("@")){
        correo.classList.add("error");
        errorCorreo.textContent = "Correo no válido";
        valido = false;
    }

    if(password.value.length < 6){
        password.classList.add("error");
        errorPassword.textContent = "Mínimo 6 caracteres";
        valido = false;
    }

    if(password.value !== confirmar.value){
        confirmar.classList.add("error");
        errorConfirmar.textContent = "Las contraseñas no coinciden";
        valido = false;
    }

    if(!valido){
        mostrarModal("error", "Error en formulario", "Corrige los campos");
        return;
    }

    mostrarModal("success", "Registro exitoso", "Tu cuenta fue creada correctamente");
}
</script>

</body>
</html>
