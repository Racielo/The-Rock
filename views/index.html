<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>The Rock</title>

    <style>
    /* ===== FONDO ===== */
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background-color: #8b5a2b;
        position: relative;
    }

    body::before {
        content: "";
        position: fixed;
        width: 100%;
        height: 100%;
        background-image: url('assets/img/fondo.png'); /* ✅ ruta correcta */
        background-repeat: repeat;
        background-size: 300px;
        opacity: 0.2;
        z-index: -1;
    }

    /* ===== NAVBAR ===== */
    .navbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 15px 30px;
        background: rgba(255,255,255,0.1);
        backdrop-filter: blur(10px);
    }

    /* ===== LOGO ===== */
    .logo {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        object-fit: cover;
    }

    /* ===== BUSCADOR ===== */
    .buscador-2 {
        display: flex;
        align-items: center;
        background: #ffffff;
        border-radius: 40px;
        overflow: hidden;
        width: 400px;
    }

    .btn-todos {
        background: transparent;
        border: none;
        padding: 10px 20px;
        font-weight: bold;
        cursor: pointer;
    }

    .separador {
        width: 1px;
        height: 25px;
        background: #8b5a2b;
    }

    .buscador-2 input {
        border: none;
        padding: 10px;
        flex: 1;
        outline: none;
    }

    .btn-buscar {
        border: none;
        background: transparent;
        padding: 10px;
        cursor: pointer;
    }

    /* ===== BOTONES ===== */
    .acciones {
        display: flex;
        gap: 10px;
    }

    button {
        border: none;
        padding: 10px 15px;
        border-radius: 20px;
        cursor: pointer;
    }

    .btn-login {
        background: white;
    }

    .btn-crear {
        background: #d9a679;
        color: white;
    }

    /* ===== HERO ===== */
    .hero {
        text-align: center;
        margin-top: 20px;
    }

    .titulo-principal {
        color: white;
        font-size: 50px;
        margin-bottom: 20px;
    }

    /* ===== CATEGORÍAS ===== */
    .categorias {
        display: flex;
        justify-content: center;
        gap: 40px;
    }

    .categoria {
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 140px;
        text-align: center;
        color: white;
        cursor: pointer;
        transition: all 0.3s ease;
    }

    .categoria p {
        margin-top: 10px;
        font-size: 16px;
        max-width: 120px;
    }

    .categoria:hover {
        transform: scale(1.1);
    }

    .icono {
        width: 100px;
        height: 100px;
        border-radius: 50%;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        background: white;
    }

    .icono img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }
    </style>
</head>

<body>

<div class="navbar">

    <div class="logo-container">
        <img src="assets/img/logo.png" class="logo">
    </div>

    <div class="buscador-2">
        <button class="btn-todos">Todos los productos</button>
        <div class="separador"></div>
        <input type="text" placeholder="Buscar...">
        <button class="btn-buscar">🔍</button>
    </div>

    <div class="acciones">
        <button class="btn-login">Iniciar sesión</button>
        <button class="btn-crear">Crear cuenta</button>
    </div>

</div>

<div class="hero">

    <h1 class="titulo-principal">Productos</h1>

    <div class="categorias">

        <div class="categoria">
            <div class="icono">
                <img src="assets/img/pasteles.jpg">
            </div>
            <p>Pasteles</p>
        </div>

        <div class="categoria">
            <div class="icono">
                <img src="assets/img/eventos.jpg"> <!-- 🔥 agrega esta imagen -->
            </div>
            <p>Pasteles para eventos</p>
        </div>

        <div class="categoria">
            <div class="icono">
                <img src="assets/img/galletas.jpg"> <!-- 🔥 agrega esta imagen -->
            </div>
            <p>Galletas</p>
        </div>

        <div class="categoria">
            <div class="icono">
                <img src="assets/img/panaderia.jpg"> <!-- 🔥 agrega esta imagen -->
            </div>
            <p>Panadería</p>
        </div>

    </div>

</div>

</body>
</html>
